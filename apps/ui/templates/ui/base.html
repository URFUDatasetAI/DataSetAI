{% load ui_static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title|default:"DataSetAI" }}</title>
    <script>
        (function () {
            var storedTheme = null;
            try {
                storedTheme = localStorage.getItem("datasetai-theme");
            } catch (error) {
                storedTheme = null;
            }
            var preferredTheme = storedTheme || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.dataset.theme = preferredTheme;
        })();
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="{% versioned_static 'ui/datasetai-favicon.png' %}">
    <link rel="shortcut icon" href="{% versioned_static 'ui/datasetai-favicon.png' %}">
    <link rel="stylesheet" href="{% versioned_static 'ui/app.css' %}">
    {{ ui_bootstrap|json_script:"ui-bootstrap-data" }}
</head>
<body data-page="{{ page_key|default:'home' }}">
    <div id="app-root"></div>
    <script src="{% versioned_static 'ui/app.js' %}"></script>
</body>
</html>
